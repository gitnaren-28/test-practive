AWSTemplateFormatVersion: '2010-09-09'
Description: MLR Lambda Functions Stack 

Parameters:
  UseCaseName:
    Type: String
    Default: mlr
  LambdaS3Bucket:
    Type: String
    Default: mlr-lambda-code
    Description: S3 bucket containing Lambda code

Resources:

  ########################################
  # IAM Role for Lambda Execution
  ########################################

  TextractRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${UseCaseName}-textract-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TextractPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${LambdaS3Bucket}/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UseCaseName}*'
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${UseCaseName}*'
              - Effect: Allow
                Action:
                  - textract:DetectDocumentText
                  - textract:AnalyzeDocument
                Resource: '*'

  ########################################
  # Lambda Function
  ########################################

  TextractTextLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${UseCaseName}-textract-text'
      Runtime: python3.11
      Handler: mlr-textract-text.lambda_handler
      Role: !GetAtt TextractRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: mlr-textract-text.zip

Outputs:
  TextractTextLambdaArn:
    Value: !GetAtt TextractTextLambda.Arn
