AWSTemplateFormatVersion: '2010-09-09'
Description: HTTP API Gateway with POST /upload-document integrated to Lambda

Parameters:
  UseCaseName:
    Type: String
    Default: mlr
    Description: "Name of the Use Case being developed"

  ApiName:
    Type: String
    Default: upload-document
    Description: Name of the HTTP API

  StageName:
    Type: String
    Default: v1
    Description: Deployment stage name

  LambdaFunctionName:
    Type: String
    Default: mlr-upload-document
    Description: Name of the existing Lambda function

Resources:

  # HTTP API
  UploadDocumentHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${UseCaseName}-${ApiName}
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "http://localhost:5173"
          - "https://d3dbf5czxdm0ud.cloudfront.net"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  # Lambda Integration
  UploadDocumentIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref UploadDocumentHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}
      PayloadFormatVersion: "2.0"

  # Route: POST /upload-document
  UploadDocumentRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref UploadDocumentHttpApi
      RouteKey: "POST /upload-document"
      Target: !Join ['/', ['integrations', !Ref UploadDocumentIntegration]]

  # Stage (v1 default)
  UploadDocumentStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref UploadDocumentHttpApi
      StageName: !Ref StageName
      AutoDeploy: true

  # Permission for API Gateway to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${UploadDocumentHttpApi}/*/POST/upload-document

Outputs:

  ApiId:
    Description: HTTP API ID
    Value: !Ref UploadDocumentHttpApi

  ApiEndpoint:
    Description: Base endpoint URL
    Value: !GetAtt UploadDocumentHttpApi.ApiEndpoint

  UploadDocumentInvokeURL:
    Description: Full invoke URL for POST /upload-document
    Value: !Sub ${UploadDocumentHttpApi.ApiEndpoint}/${StageName}/upload-document
