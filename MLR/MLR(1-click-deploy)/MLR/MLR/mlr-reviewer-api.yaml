AWSTemplateFormatVersion: '2010-09-09'
Description: MLR Reviewer API Lambda Function with HTTP API Gateway

Parameters:
  UseCaseName:
    Type: String
    Default: mlr
  
  Environment:
    Type: String
    Default: dev
    Description: Environment name
  
  ApiName:
    Type: String
    Default: reviewer-api
    Description: API Gateway name
  
  LambdaS3Bucket:
    Type: String
    Default: mlr-lambda-code
    Description: S3 bucket containing Lambda code
  
  LambdaRuntime:
    Type: String
    Default: python3.11
    AllowedValues:
      - python3.11
      - python3.12
      - python3.13
    Description: Lambda function runtime

Resources:
  ############################################
  # IAM Role for Lambda
  ############################################
  ReviewerApiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${UseCaseName}-reviewer-api-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReviewerApiPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${UseCaseName}*'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/MLR*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UseCaseName}*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*'

  ############################################
  # Lambda Function
  ############################################
  ReviewerApi:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${UseCaseName}-reviewer-api'
      Runtime: !Ref LambdaRuntime
      Handler: mlr-reviewer-api.lambda_handler
      Role: !GetAtt ReviewerApiRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          USE_CASE: !Ref UseCaseName
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: mlr-reviewer-api.zip

  ############################################
  # Lambda Permission for API Gateway
  ############################################
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReviewerApi
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  ############################################
  # HTTP API Gateway with OpenAPI Spec
  ############################################
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Body:
        openapi: '3.0.1'
        info:
          title: !Sub ${UseCaseName}-${ApiName}
        paths:
          /users/{user_id}/tasks:
            get:
              parameters:
                - name: 'user_id'
                  in: 'path'
                  description: 'User ID to retrieve tasks'
                  required: true
                  schema:
                    type: 'string'
              responses:
                default:
                  description: 'Get tasks for a user'
              x-amazon-apigateway-integration:
                payloadFormatVersion: '2.0'
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReviewerApi.Arn}/invocations'
                connectionType: 'INTERNET'
          /reviewers/{reviewer_id}/tasks:
            get:
              parameters:
                - name: 'reviewer_id'
                  in: 'path'
                  description: 'Reviewer ID to retrieve tasks'
                  required: true
                  schema:
                    type: 'string'
              responses:
                default:
                  description: 'Get tasks for a reviewer'
              x-amazon-apigateway-integration:
                payloadFormatVersion: '2.0'
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReviewerApi.Arn}/invocations'
                connectionType: 'INTERNET'
          /documents/{document_id}/review:
            get:
              parameters:
                - name: 'document_id'
                  in: 'path'
                  description: 'Document ID to retrieve review'
                  required: true
                  schema:
                    type: 'string'
              responses:
                default:
                  description: 'Get document review'
              x-amazon-apigateway-integration:
                payloadFormatVersion: '2.0'
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReviewerApi.Arn}/invocations'
                connectionType: 'INTERNET'
            post:
              parameters:
                - name: 'document_id'
                  in: 'path'
                  description: 'Document ID to create review'
                  required: true
                  schema:
                    type: 'string'
              responses:
                default:
                  description: 'Create document review'
              x-amazon-apigateway-integration:
                payloadFormatVersion: '2.0'
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReviewerApi.Arn}/invocations'
                connectionType: 'INTERNET'
            patch:
              parameters:
                - name: 'document_id'
                  in: 'path'
                  description: 'Document ID to update review'
                  required: true
                  schema:
                    type: 'string'
              responses:
                default:
                  description: 'Update document review'
              x-amazon-apigateway-integration:
                payloadFormatVersion: '2.0'
                type: 'aws_proxy'
                httpMethod: 'POST'
                uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReviewerApi.Arn}/invocations'
                connectionType: 'INTERNET'
        x-amazon-apigateway-cors:
          allowMethods:
            - 'GET'
            - 'POST'
            - 'PATCH'
            - 'OPTIONS'
          allowHeaders:
            - '*'
          maxAge: 300
          allowCredentials: false
          allowOrigins:
            - '*'
          exposeHeaders:
            - Content-Type
            - Authorization
            - X-Amz-Date
            - X-Api-Key
            - X-Amz-Security-Token
            - X-Amzn-Trace-Id
            - X-Requested-With
        x-amazon-apigateway-importexport-version: '1.0'

  ############################################
  # API Stage
  ############################################
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true

Outputs:
  ReviewerApiArn:
    Description: Lambda Function ARN
    Value: !GetAtt ReviewerApi.Arn
  
  ApiEndpoint:
    Description: HTTP API Gateway endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
  
  ApiId:
    Description: API Gateway ID
    Value: !Ref HttpApi
  
  ApiStageName:
    Description: API Stage Name
    Value: !Ref ApiStage