AWSTemplateFormatVersion: '2010-09-09'
Description: MLR Reviewer Agent Lambda Function

Parameters:
  UseCaseName:
    Type: String
    Default: mlr
    Description: Prefix for naming resources

  LambdaS3Bucket:
    Type: String
    Default: mlr-lambda-code
    Description: S3 bucket containing Lambda code

  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues:
      - python3.12
      - python3.11
      - python3.10

  Environment:
    Type: String
    Default: dev
    Description: Environment name

Resources:
  ############################################
  # IAM Role for Lambda
  ############################################
  ReviewerAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${UseCaseName}-reviewer-agent-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReviewerAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${UseCaseName}*'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/MLR*'

              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UseCaseName}*'

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${UseCaseName}*'
                  - !Sub 'arn:aws:s3:::${UseCaseName}*/*'

              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*'

              - Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${UseCaseName}*'

  ############################################
  # Lambda: MLR Reviewer Agent
  ############################################
  ReviewerAgent:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${UseCaseName}-reviewer-agent'
      Runtime: !Ref LambdaRuntime
      Handler: mlr-reviewer-agent.lambda_handler
      Role: !GetAtt ReviewerAgentRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          USE_CASE: !Ref UseCaseName
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: mlr-reviewer-agent.zip

Outputs:
  ############################################
  # Lambda Outputs
  ############################################
  ReviewerAgentArn:
    Description: MLR Reviewer Agent Lambda ARN
    Value: !GetAtt ReviewerAgent.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ReviewerAgentArn'
